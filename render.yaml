services:
  - type: web
    name: trust-electric-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trust-electric-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: USE_MOCK_DATA
        value: "true"
      - key: ENVIRONMENT
        value: "production"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: UNLEASHED_API_ID
        sync: false
      - key: UNLEASHED_API_KEY
        sync: false

databases:
  - name: trust-electric-db
    plan: free
    databaseName: trust_electric
    user: trust
